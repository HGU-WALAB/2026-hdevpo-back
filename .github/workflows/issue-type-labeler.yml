name: Issue Type Labeler

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Apply labels, update title, and set native Issue Type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: |
          # --- Extract issue type from form ---
          TYPE=$(echo "$BODY" | awk '/Issue Type/{found=1; next} found && NF{print; exit}' | tr -d '[:space:]')

          case "$TYPE" in
            Bug)     PREFIX="[bug]" ;;
            Feature) PREFIX="[feat]" ;;
            Task)    PREFIX="[task]" ;;
            *)
              echo "Unknown type: '$TYPE' — skipping"
              exit 0
              ;;
          esac

          ORG=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)

          # --- Update title prefix ---
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | sed 's/^\[.*\][[:space:]]*//')
          NEW_TITLE="$PREFIX : $CLEAN_TITLE"
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --title "$NEW_TITLE"

          # --- Set native GitHub Issue Type ---
          ISSUE_TYPE_ID=$(gh api graphql -f query='
            query($org: String!) {
              organization(login: $org) {
                issueTypes(first: 20) {
                  nodes { id name }
                }
              }
            }
          ' -f org="$ORG" --jq ".data.organization.issueTypes.nodes[] | select(.name == \"$TYPE\") | .id" 2>/dev/null || true)

          if [ -n "$ISSUE_TYPE_ID" ]; then
            ISSUE_NODE_ID=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) { id }
                }
              }
            ' -f owner="$ORG" -f repo="$REPO_NAME" -F number="$ISSUE_NUMBER" --jq '.data.repository.issue.id')

            gh api graphql -f query='
              mutation($issueId: ID!, $issueTypeId: ID!) {
                updateIssue(input: {id: $issueId, issueTypeId: $issueTypeId}) {
                  issue { id }
                }
              }
            ' -f issueId="$ISSUE_NODE_ID" -f issueTypeId="$ISSUE_TYPE_ID"

            echo "Set native Issue Type: '$TYPE'"
          else
            echo "Issue Type '$TYPE' not found in org — skipping native type"
          fi

          # --- Apply selected labels ---
          LABELS=$(echo "$BODY" | awk '/Labels \(optional\)/{found=1; next} found && /\[x\]/{sub(/.*\[x\] /, ""); print} found && /^###/{exit}')

          if [ -n "$LABELS" ]; then
            while IFS= read -r label; do
              [ -z "$label" ] && continue
              # Strip inline description (e.g. "bug — Something isn't working" → "bug")
              label_name=$(echo "$label" | sed 's/ —.*//' | sed 's/[[:space:]]*$//')
              gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "$label_name"
            done <<< "$LABELS"
          fi

          echo "Updated title to '$NEW_TITLE'"
          echo "Applied labels: $(echo "$LABELS" | sed 's/ —.*//' | tr '\n' ', ')"
